<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WF1 — Campaign Optimization Workflow</title>
<style>
body{margin:0;padding:24px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f8f8f6}
h2{font-size:17px;font-weight:500;margin:0 0 4px;color:#0f0f0e}
p{font-size:13px;color:#5f5e5a;margin:0 0 20px}
svg text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
.th{font-size:14px;font-weight:500;fill:#0f0f0e}
.ts{font-size:12px;fill:#5f5e5a}
.arr{stroke:var(--arr-c,#888780);stroke-width:1.5;fill:none}
.c-amber rect{fill:#FAEEDA;stroke:#854F0B;stroke-width:0.5}
.c-amber text{fill:#633806}
.c-purple rect{fill:#EEEDFE;stroke:#534AB7;stroke-width:0.5}
.c-purple text{fill:#3C3489}
.c-teal rect{fill:#E1F5EE;stroke:#0F6E56;stroke-width:0.5}
.c-teal text{fill:#085041}
.c-gray rect{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:0.5}
.c-gray text{fill:#444441}
.node{cursor:pointer}
.node:hover rect{opacity:.88}
@media(prefers-color-scheme:dark){
  body{background:#1c1c1a;color:#e8e6df}
  h2{color:#e8e6df} p{color:#9c9a92}
  .th{fill:#e8e6df} .ts{fill:#9c9a92}
  .c-amber rect{fill:#412402;stroke:#EF9F27}
  .c-amber text{fill:#FAC775}
  .c-purple rect{fill:#26215C;stroke:#7F77DD}
  .c-purple text{fill:#CECBF6}
  .c-teal rect{fill:#04342C;stroke:#1D9E75}
  .c-teal text{fill:#9FE1CB}
  .c-gray rect{fill:#2C2C2A;stroke:#888780}
  .c-gray text{fill:#D3D1C7}
}
</style>
</head>
<body>
<h2>WF1 — Campaign optimization</h2>
<p>2-hour recurring loop: data ingestion → anomaly detection → orchestrator routing → platform execution → outcome validation → rollback or confirm</p>

<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- LEGEND -->
<g class="c-amber"><rect x="40" y="14" width="12" height="12" rx="2"/></g>
<text class="ts" x="56" y="23">Human</text>
<g class="c-purple"><rect x="110" y="14" width="12" height="12" rx="2"/></g>
<text class="ts" x="126" y="23">Orchestrator</text>
<g class="c-teal"><rect x="218" y="14" width="12" height="12" rx="2"/></g>
<text class="ts" x="234" y="23">AI agent</text>
<g class="c-gray"><rect x="296" y="14" width="12" height="12" rx="2"/></g>
<text class="ts" x="312" y="23">Platform / data</text>

<!-- ROW 1 -->
<g class="c-gray node">
  <rect x="30" y="50" width="130" height="56" rx="8"/>
  <text class="th" x="95" y="70" text-anchor="middle" dominant-baseline="central">Google Ads</text>
  <text class="ts" x="95" y="88" text-anchor="middle" dominant-baseline="central">Meta · Appsflyer</text>
</g>

<g class="c-teal node">
  <rect x="200" y="50" width="150" height="56" rx="8"/>
  <text class="th" x="275" y="70" text-anchor="middle" dominant-baseline="central">Data Sync Agent</text>
  <text class="ts" x="275" y="88" text-anchor="middle" dominant-baseline="central">Airbyte · dbt · every 2 hrs</text>
</g>

<g class="c-gray node">
  <rect x="396" y="50" width="140" height="56" rx="8"/>
  <text class="th" x="466" y="70" text-anchor="middle" dominant-baseline="central">DataBricks Gold</text>
  <text class="ts" x="466" y="88" text-anchor="middle" dominant-baseline="central">KPI aggregates · campaign data</text>
</g>

<line x1="160" y1="78" x2="198" y2="78" stroke="#1D9E75" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<line x1="350" y1="78" x2="394" y2="78" stroke="#1D9E75" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- ROW 2: KPI Monitor -->
<g class="c-teal node">
  <rect x="200" y="146" width="150" height="56" rx="8"/>
  <text class="th" x="275" y="166" text-anchor="middle" dominant-baseline="central">KPI Monitor Agent</text>
  <text class="ts" x="275" y="184" text-anchor="middle" dominant-baseline="central">Z-score · GPT-4o root cause</text>
</g>

<line x1="275" y1="106" x2="275" y2="144" stroke="#1D9E75" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<text class="ts" x="362" y="162" fill="#A32D2D">CRITICAL</text>
<text class="ts" x="362" y="178">WARNING</text>
<text class="ts" x="362" y="194">INFO</text>
<line x1="350" y1="174" x2="360" y2="174" stroke="#888780" stroke-width="0.5" fill="none"/>

<!-- ROW 3: Orchestrator -->
<g class="c-purple node">
  <rect x="200" y="242" width="150" height="56" rx="8"/>
  <text class="th" x="275" y="262" text-anchor="middle" dominant-baseline="central">Orchestrator</text>
  <text class="ts" x="275" y="280" text-anchor="middle" dominant-baseline="central">Guardrail check · route decision</text>
</g>

<line x1="275" y1="202" x2="275" y2="240" stroke="#7F77DD" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<text class="ts" x="168" y="275" text-anchor="middle">within guardrail</text>
<line x1="200" y1="270" x2="158" y2="270" stroke="#7F77DD" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<text class="ts" x="518" y="275" text-anchor="middle">above guardrail</text>
<line x1="350" y1="270" x2="484" y2="270" stroke="#7F77DD" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- LEFT BRANCH: Campaign Opt Agent -->
<g class="c-teal node">
  <rect x="40" y="330" width="160" height="66" rx="8"/>
  <text class="th" x="120" y="351" text-anchor="middle" dominant-baseline="central">Campaign Opt. Agent</text>
  <text class="ts" x="120" y="369" text-anchor="middle" dominant-baseline="central">Bids ±20% · Budget ±15%</text>
  <text class="ts" x="120" y="384" text-anchor="middle" dominant-baseline="central">Keywords · Modifiers</text>
</g>

<line x1="120" y1="298" x2="120" y2="328" stroke="#0F6E56" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<g class="c-gray node">
  <rect x="40" y="440" width="160" height="44" rx="8"/>
  <text class="th" x="120" y="458" text-anchor="middle" dominant-baseline="central">Google Ads API</text>
  <text class="ts" x="120" y="474" text-anchor="middle" dominant-baseline="central">Meta Marketing API</text>
</g>

<line x1="120" y1="396" x2="120" y2="438" stroke="#0F6E56" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<g class="c-gray node">
  <rect x="40" y="528" width="160" height="44" rx="8"/>
  <text class="th" x="120" y="546" text-anchor="middle" dominant-baseline="central">Audit log</text>
  <text class="ts" x="120" y="562" text-anchor="middle" dominant-baseline="central">DataBricks · rollback ready</text>
</g>

<line x1="120" y1="484" x2="120" y2="526" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- RIGHT BRANCH: Human -->
<g class="c-amber node">
  <rect x="490" y="330" width="152" height="56" rx="8"/>
  <text class="th" x="566" y="350" text-anchor="middle" dominant-baseline="central">Human review</text>
  <text class="ts" x="566" y="368" text-anchor="middle" dominant-baseline="central">Slack queue · ~10 min/day</text>
</g>

<line x1="566" y1="298" x2="566" y2="328" stroke="#BA7517" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<text class="ts" x="510" y="420">Approve</text>
<text class="ts" x="510" y="438">Override / Reject</text>

<path d="M 530 400 L 480 400 L 480 363 L 350 363" fill="none" stroke="#0F6E56" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="418" y="356">approved action</text>

<!-- Outcome validation -->
<text class="ts" x="275" y="512" text-anchor="middle">+2 hrs: outcome validated</text>
<text class="ts" x="275" y="528" text-anchor="middle">IMPROVED → confirm   DEGRADED →</text>
<text class="ts" x="275" y="544" text-anchor="middle" fill="#A32D2D">auto-rollback via API</text>

<path d="M 200 550 L 180 550 L 180 174 L 198 174" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
<text class="ts" x="66" y="540">↻ next 2-hr cycle</text>

<path d="M 350 174 L 466 174 L 466 106" fill="none" stroke="#1D9E75" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="436" y="147">reads</text>
</svg>
</body>
</html>
