<style>

.ts{font-size:12px;fill:#5f5e5a}
.c-amber rect{fill:#FAEEDA;stroke:#854F0B;stroke-width:0.5}
.c-amber .th{fill:#633806}.c-amber .ts{fill:#854F0B}

.c-purple .th{fill:#3C3489}.c-purple .ts{fill:#534AB7}

.c-coral .th{fill:#712B13}.c-coral .ts{fill:#993C1D}

.c-teal .th{fill:#085041}.c-teal .ts{fill:#0F6E56}

  .c-coral .th{fill:#F5C4B3}.c-coral .ts{fill:#D85A30}

  .c-teal .th{fill:#9FE1CB}.c-teal .ts{fill:#5DCAA5}

<body>
<h2>WF4 — Closed feedback loop</h2>
<p>Every agent action is logged, validated +2 hrs later, auto-rolled back if performance degrades, and learned from weekly — improving future decisions</p>

<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
</marker>
</defs>

<!-- LEGEND -->
<g class="c-amber"><rect x="40" y="12" width="12" height="12" rx="2"></rect></g>
<text class="ts" x="56" y="21">Human</text>
<g class="c-purple"><rect x="110" y="12" width="12" height="12" rx="2"></rect></g>
<text class="ts" x="126" y="21">Orchestrator</text>
<g class="c-teal"><rect x="218" y="12" width="12" height="12" rx="2"></rect></g>
<text class="ts" x="234" y="21">AI agents</text>
<g class="c-coral"><rect x="298" y="12" width="12" height="12" rx="2"></rect></g>
<text class="ts" x="314" y="21">Creative agents</text>
<g class="c-gray"><rect x="406" y="12" width="12" height="12" rx="2"></rect></g>
<text class="ts" x="422" y="21">Platform / data</text>

<!-- STEP 1: Agent executes action -->
<g class="c-teal node">
  <rect x="190" y="40" width="300" height="56" rx="8"></rect>
  <text class="th" x="340" y="60" text-anchor="middle" dominant-baseline="central">Campaign Opt. Agent — action</text>
  <text class="ts" x="340" y="78" text-anchor="middle" dominant-baseline="central">Bid adjust · budget reallocate · keyword add</text>
</g>

<!-- Writes to two targets -->
<line x1="280" y1="96" x2="152" y2="130" stroke="#0F6E56" stroke-width="1.5" fill="none" marker-end="url(#arrow)"></line>
<line x1="400" y1="96" x2="510" y2="130" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"></line>

<!-- Audit log -->
<g class="c-gray node">
  <rect x="40" y="130" width="230" height="66" rx="8"></rect>
  <text class="th" x="155" y="150" text-anchor="middle" dominant-baseline="central">Audit log — DataBricks</text>
  <text class="ts" x="155" y="168" text-anchor="middle" dominant-baseline="central">campaign_id · change_type · before</text>
  <text class="ts" x="155" y="183" text-anchor="middle" dominant-baseline="central">after · confidence · rollback_fn</text>
</g>

<!-- Platform API write -->
<g class="c-gray node">
  <rect x="390" y="130" width="230" height="52" rx="8"></rect>
  <text class="th" x="505" y="150" text-anchor="middle" dominant-baseline="central">Platform APIs</text>
  <text class="ts" x="505" y="168" text-anchor="middle" dominant-baseline="central">Google Ads API · Meta API — write</text>
</g>

<!-- STEP 2: Data re-sync +2hrs -->
<g class="c-teal node">
  <rect x="190" y="252" width="300" height="52" rx="8"></rect>
  <text class="th" x="340" y="272" text-anchor="middle" dominant-baseline="central">Data Sync Agent (+2 hrs)</text>
  <text class="ts" x="340" y="290" text-anchor="middle" dominant-baseline="central">Updated performance ingested · action timestamp as dim</text>
</g>

<line x1="505" y1="182" x2="505" y2="226" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3" fill="none"></line>
<line x1="505" y1="226" x2="430" y2="250" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"></line>
<text class="ts" x="480" y="220">new data</text>

<line x1="155" y1="196" x2="155" y2="226" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3" fill="none"></line>
<line x1="155" y1="226" x2="250" y2="250" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"></line>

<line x1="340" y1="304" x2="340" y2="330" stroke="#1D9E75" stroke-width="1.5" fill="none" marker-end="url(#arrow)"></line>

<!-- STEP 3: KPI Monitor outcome validation -->
<g class="c-teal node">
  <rect x="170" y="330" width="340" height="56" rx="8"></rect>
  <text class="th" x="340" y="350" text-anchor="middle" dominant-baseline="central">KPI Monitor Agent — outcome validation</text>
  <text class="ts" x="340" y="368" text-anchor="middle" dominant-baseline="central">Post-action CPA/ROAS vs. pre-action baseline</text>
</g>

<line x1="340" y1="386" x2="340" y2="412" stroke="#1D9E75" stroke-width="1.5" fill="none" marker-end="url(#arrow)"></line>

<!-- Outcome annotation box -->
<rect x="548" y="336" width="112" height="56" rx="6" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 3"></rect>
<text class="ts" x="604" y="356" text-anchor="middle" fill="#3B6D11">IMPROVED</text>
<text class="ts" x="604" y="372" text-anchor="middle">NEUTRAL</text>
<text class="ts" x="604" y="388" text-anchor="middle" fill="#A32D2D">DEGRADED</text>
<line x1="510" y1="358" x2="546" y2="358" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="2 2" fill="none"></line>

<!-- STEP 4: Orchestrator decision -->
<g class="c-purple node">
  <rect x="170" y="412" width="340" height="56" rx="8"></rect>
  <text class="th" x="340" y="432" text-anchor="middle" dominant-baseline="central">Orchestrator — outcome decision</text>
  <text class="ts" x="340" y="450" text-anchor="middle" dominant-baseline="central">IMPROVED → confirm   DEGRADED &gt;20% → rollback</text>
</g>

<!-- Rollback path to platform -->
<text class="ts" x="590" y="435" fill="#A32D2D">auto-rollback</text>
<path d="M 510 440 L 585 440 L 585 156 L 622 156" fill="none" stroke="#E24B4A" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"></path>
<text class="ts" x="620" y="200" fill="#A32D2D">via API</text>

<line x1="340" y1="468" x2="340" y2="492" stroke="#7F77DD" stroke-width="1.5" fill="none" marker-end="url(#arrow)"></line>

<!-- STEP 5: Pattern learning -->
<g class="c-purple node">
  <rect x="140" y="492" width="400" height="56" rx="8"></rect>
  <text class="th" x="340" y="512" text-anchor="middle" dominant-baseline="central">Orchestrator — weekly pattern learning</text>
  <text class="ts" x="340" y="530" text-anchor="middle" dominant-baseline="central">GPT-4o aggregates outcomes · learned rules → Redis config</text>
</g>

<line x1="340" y1="548" x2="340" y2="568" stroke="#BA7517" stroke-width="1.5" fill="none" marker-end="url(#arrow)"></line>

<!-- STEP 6: Human monthly tuning -->
<g class="c-amber node">
  <rect x="200" y="568" width="280" height="44" rx="8"></rect>
  <text class="th" x="340" y="585" text-anchor="middle" dominant-baseline="central">Human — monthly guardrail review</text>
  <text class="ts" x="340" y="601" text-anchor="middle" dominant-baseline="central">Expand thresholds where agent proven reliable</text>
</g>

<!-- Creative feedback sub-loop -->
<g class="c-coral node">
  <rect x="30" y="412" width="120" height="68" rx="8"></rect>
  <text class="th" x="90" y="432" text-anchor="middle" dominant-baseline="central">Creative loop</text>
  <text class="ts" x="90" y="450" text-anchor="middle" dominant-baseline="central">Winner attrs</text>
  <text class="ts" x="90" y="466" text-anchor="middle" dominant-baseline="central">→ DataBricks</text>
</g>

<!-- Arrow from KPI Monitor to creative loop -->
<path d="M 170 358 L 90 358 L 90 410" fill="none" stroke="#993C1D" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arrow)"></path>
<text class="ts" x="34" y="390">creative</text>
<text class="ts" x="34" y="403">outcome</text>

<!-- Arrow from creative loop back to top (next cycle) -->
<path d="M 30 446 L 14 446 L 14 68 L 188 68" fill="none" stroke="#993C1D" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arrow)"></path>
<text class="ts" x="16" y="260">↻ improves next brief</text>

</svg>


</body></html>
