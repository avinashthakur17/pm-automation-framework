<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WF3 — Reporting Automation</title>
<style>
body{margin:0;padding:24px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f8f8f6}
h2{font-size:17px;font-weight:500;margin:0 0 4px;color:#0f0f0e}
p{font-size:13px;color:#5f5e5a;margin:0 0 20px}
svg text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
.th{font-size:14px;font-weight:500;fill:#0f0f0e}
.ts{font-size:12px;fill:#5f5e5a}
.c-amber rect{fill:#FAEEDA;stroke:#854F0B;stroke-width:0.5}
.c-amber .th{fill:#633806}.c-amber .ts{fill:#854F0B}
.c-teal rect{fill:#E1F5EE;stroke:#0F6E56;stroke-width:0.5}
.c-teal .th{fill:#085041}.c-teal .ts{fill:#0F6E56}
.c-green rect{fill:#EAF3DE;stroke:#3B6D11;stroke-width:0.5}
.c-green .th{fill:#27500A}.c-green .ts{fill:#3B6D11}
.c-gray rect{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:0.5}
.c-gray .th{fill:#444441}.c-gray .ts{fill:#5F5E5A}
.node{cursor:pointer}
.node:hover rect{opacity:.88}
@media(prefers-color-scheme:dark){
  body{background:#1c1c1a} h2{color:#e8e6df} p{color:#9c9a92}
  .th{fill:#e8e6df} .ts{fill:#9c9a92}
  .c-amber rect{fill:#412402;stroke:#EF9F27}
  .c-amber .th{fill:#FAC775}.c-amber .ts{fill:#EF9F27}
  .c-teal rect{fill:#04342C;stroke:#1D9E75}
  .c-teal .th{fill:#9FE1CB}.c-teal .ts{fill:#5DCAA5}
  .c-green rect{fill:#173404;stroke:#3B6D11}
  .c-green .th{fill:#C0DD97}.c-green .ts{fill:#97C459}
  .c-gray rect{fill:#2C2C2A;stroke:#888780}
  .c-gray .th{fill:#D3D1C7}.c-gray .ts{fill:#B4B2A9}
}
</style>
</head>
<body>
<h2>WF3 — Reporting automation</h2>
<p>Bi-hourly intelligence pipeline: data sync → anomaly detection → GPT-4o summarization → multi-channel delivery → human review</p>

<svg width="100%" viewBox="0 0 680 530" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- LEGEND -->
<g class="c-amber"><rect x="40" y="12" width="12" height="12" rx="2"/></g>
<text class="ts" x="56" y="21">Human</text>
<g class="c-teal"><rect x="116" y="12" width="12" height="12" rx="2"/></g>
<text class="ts" x="132" y="21">AI agent</text>
<g class="c-green"><rect x="200" y="12" width="12" height="12" rx="2"/></g>
<text class="ts" x="216" y="21">Reporting agent</text>
<g class="c-gray"><rect x="322" y="12" width="12" height="12" rx="2"/></g>
<text class="ts" x="338" y="21">Platform / data</text>

<!-- ROW 1: Data sources → Data Sync → DataBricks Gold -->
<g class="c-gray node">
  <rect x="30" y="44" width="140" height="68" rx="8"/>
  <text class="th" x="100" y="63" text-anchor="middle" dominant-baseline="central">Data sources</text>
  <text class="ts" x="100" y="81" text-anchor="middle" dominant-baseline="central">Google Ads · Meta</text>
  <text class="ts" x="100" y="96" text-anchor="middle" dominant-baseline="central">Appsflyer · GA4</text>
</g>

<g class="c-teal node">
  <rect x="218" y="52" width="172" height="52" rx="8"/>
  <text class="th" x="304" y="72" text-anchor="middle" dominant-baseline="central">Data Sync Agent</text>
  <text class="ts" x="304" y="90" text-anchor="middle" dominant-baseline="central">Airbyte pull · dbt transform</text>
</g>

<g class="c-gray node">
  <rect x="438" y="52" width="200" height="52" rx="8"/>
  <text class="th" x="538" y="72" text-anchor="middle" dominant-baseline="central">DataBricks Gold layer</text>
  <text class="ts" x="538" y="90" text-anchor="middle" dominant-baseline="central">KPIs · agent action log ready</text>
</g>

<line x1="170" y1="78" x2="216" y2="78" stroke="#1D9E75" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<line x1="390" y1="78" x2="436" y2="78" stroke="#1D9E75" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- ROW 2: KPI Monitor -->
<g class="c-teal node">
  <rect x="218" y="150" width="172" height="56" rx="8"/>
  <text class="th" x="304" y="170" text-anchor="middle" dominant-baseline="central">KPI Monitor Agent</text>
  <text class="ts" x="304" y="188" text-anchor="middle" dominant-baseline="central">Anomaly classify · severity tags</text>
</g>

<line x1="304" y1="104" x2="304" y2="148" stroke="#1D9E75" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- Severity outputs on right -->
<text class="ts" x="400" y="166" fill="#A32D2D">CRITICAL → immediate WA alert</text>
<text class="ts" x="400" y="182">WARNING → next report cycle</text>
<text class="ts" x="400" y="198">INFO → daily digest only</text>
<line x1="390" y1="178" x2="398" y2="178" stroke="#888780" stroke-width="0.5" fill="none"/>

<!-- ROW 3: Reporting Agent assembly -->
<g class="c-green node">
  <rect x="180" y="252" width="240" height="56" rx="8"/>
  <text class="th" x="300" y="271" text-anchor="middle" dominant-baseline="central">Reporting Agent — assembly</text>
  <text class="ts" x="300" y="289" text-anchor="middle" dominant-baseline="central">Gold KPIs · anomalies · action log · deltas</text>
</g>

<line x1="304" y1="206" x2="304" y2="250" stroke="#3B6D11" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- ROW 4: GPT-4o summarization -->
<g class="c-green node">
  <rect x="180" y="352" width="240" height="56" rx="8"/>
  <text class="th" x="300" y="371" text-anchor="middle" dominant-baseline="central">GPT-4o summarization</text>
  <text class="ts" x="300" y="389" text-anchor="middle" dominant-baseline="central">150-word WA summary · top 3 actions</text>
</g>

<line x1="300" y1="308" x2="300" y2="350" stroke="#3B6D11" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- ROW 5: Delivery fan-out -->
<line x1="260" y1="408" x2="120" y2="452" stroke="#3B6D11" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<line x1="300" y1="408" x2="300" y2="452" stroke="#3B6D11" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<line x1="340" y1="408" x2="490" y2="452" stroke="#3B6D11" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- WA -->
<g class="c-gray node">
  <rect x="40" y="452" width="160" height="44" rx="8"/>
  <text class="th" x="120" y="470" text-anchor="middle" dominant-baseline="central">WhatsApp Business API</text>
  <text class="ts" x="120" y="486" text-anchor="middle" dominant-baseline="central">Flash report · APPROVE replies</text>
</g>

<!-- Email -->
<g class="c-gray node">
  <rect x="220" y="452" width="160" height="44" rx="8"/>
  <text class="th" x="300" y="470" text-anchor="middle" dominant-baseline="central">Gmail API</text>
  <text class="ts" x="300" y="486" text-anchor="middle" dominant-baseline="central">HTML report · weekly PDF</text>
</g>

<!-- Looker / Slack -->
<g class="c-gray node">
  <rect x="400" y="452" width="200" height="44" rx="8"/>
  <text class="th" x="500" y="470" text-anchor="middle" dominant-baseline="central">Looker Studio · Slack</text>
  <text class="ts" x="500" y="486" text-anchor="middle" dominant-baseline="central">Live dashboard · approval queue</text>
</g>

<!-- Human review -->
<g class="c-amber node">
  <rect x="160" y="510" width="340" height="14" rx="4"/>
  <text class="ts" x="330" y="521" text-anchor="middle" dominant-baseline="central">Human reviews · replies APPROVE N · or escalates critical alert</text>
</g>

<line x1="120" y1="496" x2="200" y2="510" stroke="#BA7517" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<line x1="300" y1="496" x2="300" y2="510" stroke="#BA7517" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<line x1="500" y1="496" x2="430" y2="510" stroke="#BA7517" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- Timing label + dashed trigger arrow -->
<text class="ts" x="40" y="148">Every 2 hrs</text>
<text class="ts" x="40" y="163">(n8n clock trigger)</text>
<path d="M 30 120 L 30 175 L 215 175" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arrow)"/>

<!-- DataBricks reads arrow from Gold to KPI Monitor -->
<path d="M 538 104 L 538 130 L 390 130 L 390 178 L 392 178" fill="none" stroke="#1D9E75" stroke-width="1" stroke-dasharray="3 3" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="490" y="124">reads</text>

</svg>
</body>
</html>
