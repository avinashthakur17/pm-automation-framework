<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WF2 — AI Creative Generation & Testing</title>
<style>
body{margin:0;padding:24px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f8f8f6}
h2{font-size:17px;font-weight:500;margin:0 0 4px;color:#0f0f0e}
p{font-size:13px;color:#5f5e5a;margin:0 0 20px}
svg text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
.th{font-size:14px;font-weight:500;fill:#0f0f0e}
.ts{font-size:12px;fill:#5f5e5a}
.c-amber rect{fill:#FAEEDA;stroke:#854F0B;stroke-width:0.5}
.c-amber .th{fill:#633806}.c-amber .ts{fill:#854F0B}
.c-purple rect{fill:#EEEDFE;stroke:#534AB7;stroke-width:0.5}
.c-purple .th{fill:#3C3489}.c-purple .ts{fill:#534AB7}
.c-coral rect{fill:#FAECE7;stroke:#993C1D;stroke-width:0.5}
.c-coral .th{fill:#712B13}.c-coral .ts{fill:#993C1D}
.c-teal rect{fill:#E1F5EE;stroke:#0F6E56;stroke-width:0.5}
.c-teal .th{fill:#085041}.c-teal .ts{fill:#0F6E56}
.c-gray rect{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:0.5}
.c-gray .th{fill:#444441}.c-gray .ts{fill:#5F5E5A}
.gate rect{stroke-width:1.5}
.node{cursor:pointer}
.node:hover rect{opacity:.88}
@media(prefers-color-scheme:dark){
  body{background:#1c1c1a} h2{color:#e8e6df} p{color:#9c9a92}
  .th{fill:#e8e6df} .ts{fill:#9c9a92}
  .c-amber rect{fill:#412402;stroke:#EF9F27}
  .c-amber .th{fill:#FAC775}.c-amber .ts{fill:#EF9F27}
  .c-purple rect{fill:#26215C;stroke:#7F77DD}
  .c-purple .th{fill:#CECBF6}.c-purple .ts{fill:#AFA9EC}
  .c-coral rect{fill:#4A1B0C;stroke:#D85A30}
  .c-coral .th{fill:#F5C4B3}.c-coral .ts{fill:#D85A30}
  .c-teal rect{fill:#04342C;stroke:#1D9E75}
  .c-teal .th{fill:#9FE1CB}.c-teal .ts{fill:#5DCAA5}
  .c-gray rect{fill:#2C2C2A;stroke:#888780}
  .c-gray .th{fill:#D3D1C7}.c-gray .ts{fill:#B4B2A9}
}
</style>
</head>
<body>
<h2>WF2 — AI creative generation &amp; testing</h2>
<p>From brief to live rotation — two mandatory human approval gates before any AI-generated asset reaches a platform</p>

<svg width="100%" viewBox="0 0 680 700" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- LEGEND -->
<g class="c-amber"><rect x="40" y="12" width="12" height="12" rx="2"/></g>
<text class="ts" x="56" y="21">Human</text>
<g class="c-purple"><rect x="110" y="12" width="12" height="12" rx="2"/></g>
<text class="ts" x="126" y="21">Orchestrator</text>
<g class="c-coral"><rect x="218" y="12" width="12" height="12" rx="2"/></g>
<text class="ts" x="234" y="21">Creative agents</text>
<g class="c-teal"><rect x="338" y="12" width="12" height="12" rx="2"/></g>
<text class="ts" x="354" y="21">AI gen. tools</text>
<g class="c-gray"><rect x="438" y="12" width="12" height="12" rx="2"/></g>
<text class="ts" x="454" y="21">Platform / data</text>

<!-- STEP 1: Human brief -->
<g class="c-amber node">
  <rect x="230" y="36" width="220" height="56" rx="8"/>
  <text class="th" x="340" y="56" text-anchor="middle" dominant-baseline="central">Human — creative brief</text>
  <text class="ts" x="340" y="74" text-anchor="middle" dominant-baseline="central">Offer · hook direction · formats · channels</text>
</g>
<line x1="340" y1="92" x2="340" y2="116" stroke="#D85A30" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- STEP 2: CI Agent pre-scoring -->
<g class="c-coral node">
  <rect x="200" y="116" width="280" height="56" rx="8"/>
  <text class="th" x="340" y="136" text-anchor="middle" dominant-baseline="central">Creative Intel. Agent — scoring</text>
  <text class="ts" x="340" y="154" text-anchor="middle" dominant-baseline="central">Pencil AI · predicted CTR / CVR / fatigue</text>
</g>
<line x1="340" y1="172" x2="340" y2="196" stroke="#993C1D" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- GATE 1: Human approval -->
<g class="c-amber gate node">
  <rect x="200" y="196" width="280" height="56" rx="8"/>
  <text class="th" x="340" y="215" text-anchor="middle" dominant-baseline="central">Human — Gate 1 (brief approval)</text>
  <text class="ts" x="340" y="233" text-anchor="middle" dominant-baseline="central">APPROVE · REVISE · REJECT</text>
</g>

<!-- Reject loop -->
<text class="ts" x="586" y="220">REJECT</text>
<path d="M 480 224 L 580 224 L 580 64 L 452 64" fill="none" stroke="#854F0B" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<line x1="340" y1="252" x2="340" y2="276" stroke="#D85A30" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="350" y="268">APPROVE</text>

<!-- STEP 3: Script & prompt -->
<g class="c-coral node">
  <rect x="170" y="276" width="340" height="56" rx="8"/>
  <text class="th" x="340" y="295" text-anchor="middle" dominant-baseline="central">Creative Gen. Sub-Agent — scripting</text>
  <text class="ts" x="340" y="313" text-anchor="middle" dominant-baseline="central">GPT-4o · video script · audio script · image prompt</text>
</g>
<line x1="340" y1="332" x2="340" y2="356" stroke="#993C1D" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- STEP 4: Parallel generation container -->
<rect x="30" y="356" width="620" height="100" rx="8" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="5 3"/>
<text class="ts" x="50" y="372">Parallel generation</text>

<g class="c-teal node">
  <rect x="46" y="380" width="176" height="60" rx="6"/>
  <text class="th" x="134" y="400" text-anchor="middle" dominant-baseline="central">Video</text>
  <text class="ts" x="134" y="416" text-anchor="middle" dominant-baseline="central">Runway ML · Kling AI</text>
  <text class="ts" x="134" y="430" text-anchor="middle" dominant-baseline="central">ElevenLabs · Suno · FFmpeg</text>
</g>

<g class="c-teal node">
  <rect x="242" y="380" width="176" height="60" rx="6"/>
  <text class="th" x="330" y="400" text-anchor="middle" dominant-baseline="central">Audio</text>
  <text class="ts" x="330" y="416" text-anchor="middle" dominant-baseline="central">ElevenLabs · Suno AI</text>
  <text class="ts" x="330" y="430" text-anchor="middle" dominant-baseline="central">AssemblyAI · FFmpeg mix</text>
</g>

<g class="c-teal node">
  <rect x="438" y="380" width="196" height="60" rx="6"/>
  <text class="th" x="536" y="400" text-anchor="middle" dominant-baseline="central">Image</text>
  <text class="ts" x="536" y="416" text-anchor="middle" dominant-baseline="central">Midjourney / DALL-E 3</text>
  <text class="ts" x="536" y="430" text-anchor="middle" dominant-baseline="central">Cloudinary · Bannerbear</text>
</g>

<!-- Lines from script to gen boxes -->
<line x1="200" y1="356" x2="134" y2="378" stroke="#0F6E56" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<line x1="320" y1="356" x2="330" y2="378" stroke="#0F6E56" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<line x1="480" y1="356" x2="536" y2="378" stroke="#0F6E56" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- Convergence to brand check -->
<line x1="134" y1="440" x2="270" y2="468" stroke="#993C1D" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<line x1="330" y1="440" x2="340" y2="468" stroke="#993C1D" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<line x1="536" y1="440" x2="420" y2="468" stroke="#993C1D" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- STEP 5: Brand compliance -->
<g class="c-coral node">
  <rect x="170" y="468" width="340" height="56" rx="8"/>
  <text class="th" x="340" y="487" text-anchor="middle" dominant-baseline="central">Creative Gen. Sub-Agent — QA</text>
  <text class="ts" x="340" y="505" text-anchor="middle" dominant-baseline="central">GPT-4o Vision · brand compliance · auto-regenerate fails</text>
</g>
<line x1="340" y1="524" x2="340" y2="548" stroke="#993C1D" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- GATE 2: Human asset approval -->
<g class="c-amber gate node">
  <rect x="170" y="548" width="340" height="56" rx="8"/>
  <text class="th" x="340" y="567" text-anchor="middle" dominant-baseline="central">Human — Gate 2 (asset approval)</text>
  <text class="ts" x="340" y="585" text-anchor="middle" dominant-baseline="central">Slack preview · APPROVE SELECTED · REVISE</text>
</g>

<!-- Revise loop -->
<text class="ts" x="590" y="572">REVISE</text>
<path d="M 510 576 L 588 576 L 588 410 L 436 410" fill="none" stroke="#854F0B" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<line x1="340" y1="604" x2="340" y2="628" stroke="#1D9E75" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="350" y="620">APPROVED</text>

<!-- STEP 6: Upload + rotate -->
<g class="c-gray node">
  <rect x="170" y="628" width="340" height="44" rx="8"/>
  <text class="th" x="340" y="646" text-anchor="middle" dominant-baseline="central">Platform upload + rotation pool</text>
  <text class="ts" x="340" y="662" text-anchor="middle" dominant-baseline="central">Google Asset API · Meta Creative Hub · Thompson Sampling</text>
</g>

</svg>
</body>
</html>
